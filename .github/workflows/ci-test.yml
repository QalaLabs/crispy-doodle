name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Dummy DATABASE_URL for prisma validate (no real DB needed)
  DATABASE_URL: "postgresql://user:pass@localhost:5432/aumveda?sslmode=require"

jobs:
  test:
    name: Lint · Typecheck · Prisma Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @aumveda/db prisma generate

      - name: Typecheck (all packages)
        run: pnpm turbo run typecheck

      - name: Lint (all packages)
        run: pnpm turbo run lint
        continue-on-error: true   # ESLint warnings should not block CI initially

      - name: Prisma validate
        run: pnpm --filter @aumveda/db exec prisma validate
